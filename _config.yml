remote_theme: kitian616/jekyll-TeXt-theme

text_skin: default # "default" (default), "dark", "forest", "ocean", "chocolate", "orange"
highlight_theme: default

title: Nicole Dicochea
description: >
  Thoughts on software, AI, and the developer experience.

url: https://nicoledicochea.github.io
baseurl:

author:
  name: Nicole Dicochea

repository: nicoledicochea/nicoledicochea.github.io

markdown: kramdown
highlighter: rouge
permalink: date

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
      show_edit_on_github: true
      show_subscribe: true
      pageview: true

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
